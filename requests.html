<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mentorship Requests</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
        }

        h1{
            text-align:center;
            margin:20px;
        }

        #requestList{
            display:flex;
            flex-direction:column;
            gap:15px;
            padding:20px;
        }

        .card{
            background:white;
            padding:15px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        button{
            padding:8px 12px;
            margin:5px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .approve{
            background:green;
            color:white;
        }

        .reject{
            background:red;
            color:white;
        }
    </style>
</head>

<body>
  <nav class="navbar">
    <div class="logo">Alumni Portal</div>

    <ul class="nav-links">
        <li><a href="student-dashboard.html">Student</a></li>
        <li><a href="alumni-dashboard.html">Alumni</a></li>
        <li><a href="event.html">Events</a></li>
        <li><a href="announcement.html">Announcements</a></li>
        <li><a href="request.html">Mentor Requests</a></li>
    </ul>
</nav>

<h1>Mentorship Requests</h1>

<div id="requestList">
    <p>Loading requests...</p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<script>
// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "alumni-platform-7207c.firebaseapp.com",
  databaseURL: "https://alumni-platform-7207c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "alumni-platform-7207c",
  storageBucket: "alumni-platform-7207c.appspot.com",
  messagingSenderId: "485659849647",
  appId: "1:485659849647:web:5beada5c3d7e41b87af55a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const requestList = document.getElementById("requestList");

// 🔥 LOAD DATA
function loadRequests(){

    db.ref("requests").on("value", (snapshot) => {

        requestList.innerHTML = "";

        if(!snapshot.exists()){
            requestList.innerHTML = "<p>No requests found.</p>";
            return;
        }

        snapshot.forEach((child) => {

            let data = child.val();
            let key = child.key;

            requestList.innerHTML += `
                <div class="card">
                    <h3>${data.studentName || "No Name"}</h3>

                    <p><b>Email:</b> ${data.email || "-"}</p>
                    <p><b>Department:</b> ${data.department || "-"}</p>
                    <p><b>CGPA:</b> ${data.cgpa || "-"}</p>
                    <p><b>Status:</b> ${data.status || "Pending"}</p>

                    <button class="approve" onclick="approveRequest('${key}')">
                        Approve
                    </button>

                    <button class="reject" onclick="rejectRequest('${key}')">
                        Reject
                    </button>
                </div>
            `;
        });
    });
}

// 🔥 APPROVE
function approveRequest(id){
    db.ref("requests/" + id).update({
        status: "Approved"
    });
}

// 🔥 REJECT
function rejectRequest(id){
    db.ref("requests/" + id).update({
        status: "Rejected"
    });
}

loadRequests();
</script>

</body>
</html>
